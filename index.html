function FadeIn({ children, style }) {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVis(true); }, { threshold: 0.1 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return <div ref={ref} style={{ opacity: vis ? 1 : 0, transform: vis ? "translateY(0)" : "translateY(25px)", transition: "opacity 0.8s ease, transform 0.8s ease", ...(style || {}) }}>{children}</div>;
}

function SongSection({ song, index }) {

        <div onClick={() => hasLyrics && setExpanded(!expanded)} style={{
          padding: "1rem 1.2rem", borderRadius: expanded ? "12px 12px 0 0" : 12,
          background: expanded ? c.beige : c.warmWhite, border: "1px solid " + (expanded ? c.medallion + "44" : c.dove + "33"),
          borderBottom: expanded ? "none" : undefined, cursor: hasLyrics ? "pointer" : "default",

        }}>
